{% load l10n %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de Mercadoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h2 class="h5 mb-0">Registrar Entrada de Mercadoria</h2>
                    </div>
                    <div class="card-body">
                        <form method="post" action="cadastrarentrada">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="produto" class="form-label">Produto</label>
                                <select name="produto" id="produto" class="form-select" required>
                                    <option value="" selected disabled>Selecione um produto...</option>
                                    {% for p in produtos %}
                                    <option value="{{ p.id }}">{{ p.nome }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="fornecedor" class="form-label">Fornecedor</label>
                                <select name="fornecedor" id="fornecedor" class="form-select" required>
                                    <option value="" selected disabled>Selecione um fornecedor...</option>
                                    {% for f in fornecedores %}
                                    <option value="{{ f.id }}">{{ f.nome_fantasia }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="nfe" class="form-label">Número da Nota Fiscal (NF-e)</label>
                                <input type="text" name="nfe" id="nfe" class="form-control"
                                    placeholder="Ex: 000.123.456" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="quantidade" class="form-label">Quantidade</label>
                                    <input type="number" name="quantidade" id="quantidade" class="form-control"
                                        placeholder="0" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="preco_custo" class="form-label">Preço de Custo Unitário (R$)</label>
                                    <input type="text" name="preco_custo" id="preco_custo" class="form-control"
                                        placeholder="0,00" required>
                                    <small class="text-muted">Use pontos e vírgula (Ex: 1.500,50)</small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="data" class="form-label">Data da Entrada</label>
                                <input type="date" name="data" id="data" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="observacao" class="form-label">Observação</label>
                                <textarea name="observacao" id="observacao" class="form-control" rows="3"
                                    placeholder="Algum detalhe sobre esta entrada?">{% if entrada %}{{ entrada.observacao }}{% endif %}</textarea>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-success">Confirmar Entrada</button>
                                <a href="listarentradas" class="btn btn-outline-secondary">Cancelar / Voltar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
