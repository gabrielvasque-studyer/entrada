{% load l10n %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Entrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h2 class="h5 mb-0">Editar Registro de Entrada - {{ entrada.produto.nome }}</h2>
                    </div>
                    <div class="card-body">
                        <form method="post" action="/tarefas/editarEntrada/{{ entrada.id }}">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="produto" class="form-label font-weight-bold">Produto</label>
                                <select name="produto" id="produto" class="form-select" required>
                                    {% for p in produtos %}
                                    <option value="{{ p.id }}" {% if p.id == entrada.produto.id %}selected{% endif %}>
                                        {{ p.nome }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="fornecedor" class="form-label">Fornecedor</label>
                                <select name="fornecedor" id="fornecedor" class="form-select" required>
                                    {% for f in fornecedores %}
                                    <option value="{{ f.id }}" {% if f.id == entrada.fornecedor.id %}selected{% endif %}>
                                        {{ f.nome_fantasia }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="nfe" class="form-label">Número da Nota Fiscal (NF-e)</label>
                                <input type="text" name="nfe" id="nfe" value="{{ entrada.nfe }}" class="form-control"
                                    required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="quantidade" class="form-label">Quantidade</label>
                                    <input type="number" name="quantidade" id="quantidade"
                                        value="{{ entrada.quantidade }}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="preco_custo" class="form-label">Preço de Custo (R$)</label>
                                    <input type="text" name="preco_custo" id="preco_custo"
                                        value="{% localize on %}{{ entrada.preco_custo_unitario|floatformat:2 }}{% endlocalize %}"
                                        class="form-control" required>
                                    <small class="text-muted">Ex: 1.500,50</small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="data" class="form-label">Data da Entrada</label>
                                <input type="date" name="data" id="data" value="{{ entrada.data_entrada|date:'Y-m-d' }}"
                                    class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="observacao" class="form-label">Observação</label>
                                <textarea name="observacao" id="observacao" class="form-control" rows="3"
                                    placeholder="Algum detalhe sobre esta entrada?">{% if entrada.observacao %}{{ entrada.observacao }}{% endif %}</textarea>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                                <a href="/tarefas/listarentradas" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-muted mt-3 small text-center">
                    * Ao alterar a quantidade, o estoque do produto será recalculado automaticamente.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
